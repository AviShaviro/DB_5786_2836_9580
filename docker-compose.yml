services:
  # -------------------------
  # PostgreSQL Database
  # -------------------------
  db:
    image: postgres:latest
    container_name: PostgreSQL_DB
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER_SECRET}
      POSTGRES_PASSWORD: ${DB_PASSWORD_SECRET}
      POSTGRES_DB: ${DB_NAME_SECRET}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./phase1/mockarooFiles/CHAPTERS.csv:/var/lib/postgresql/csv_data
      - ./phase1/programming/puzzles.csv:/var/lib/postgresql/csv_data
      - ./phase1/programming/daily_puzzles.csv:/var/lib/postgresql/csv_data
      - ./phase1/programming/tags.csv:/var/lib/postgresql/csv_data
      - ./phase1/programming/puzzle_attempt.csv:/var/lib/postgresql/csv_data
      - ./phase1/scripts:/var/lib/postgresql/scripts
    networks:
      - chess_network

  # -------------------------
  # pgAdmin
  # -------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadminApp
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - chess_network

# -------------------------
# Volumes
# -------------------------
volumes:
  postgres_data:
  pgadmin_data:

networks:
  chess_network:
